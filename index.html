<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misty Wynn</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="https://kit.fontawesome.com/cacf412205.js" crossorigin="anonymous"></script>
</head>
<body>
    <section id="about-me">
        <nav>
            <div class="personal__logo">Misty Wynn</div>
            <ul class="nav__link--list">
                <li>
                    <a href="" class="
                    nav__link--anchor
                    link__hover-effect
                    link__hover-effect--black
                    ">Languages</a>
                </li>
                <li>
                    <a href="" class="
                    nav__link--anchor
                    link__hover-effect
                    link__hover-effect--black
                    ">Projects</a>
                </li>
                <li>
                    <a href="" class="
                    nav__link--anchor
                    nav__link--anchor-primary
                    ">Contact</a>
                </li>
            </ul>
        </nav>
        <div class="flex flex-1">
            <div class="about-me__info row">
                <div class="about-me__info--container">
                    <figure class="about-me__picture--mask">
                        <img src="./assets/me.jpeg" class="about-me__picture"alt="Picture of Me">
                    </figure>
                    <h1 class="about-me__info--title">
                        Hey! I'm <span class="text--purple">Misty Wynn</span> 👋
                    </h1>
                    <p class="about-me__info--para">
                        I'm a <strong class="text--purple">frontend software engineer</strong> with a strong foundation in modern web technologies and a drive to learn fast and build great user experiences.
                    </p>
                    <div class="about-me__links">
                        <a href="" class="about-me__link">
                            <i class="fa-brands fa-linkedin-in"></i>
                        </a>
                        <a href="" class="about-me__link">
                            <i class="fa-brands fa-github"></i>
                        </a>
                        <a href="" class="about-me__link">
                            <i class="fa-regular fa-envelope"></i>
                        </a>
                        <a href="" class="about-me__link">
                            <i class="fa-regular fa-file"></i>
                        </a>
                        </div>
                    </div>
                </div>
            <div>
                <figure class="about-me__img--container">
                    <img src="./assets/undraw_websites.svg" class="about-me__img" alt="Illustration of a person working on a website">
                </figure>
            </div> 
            </div>
            </div>
        </div>
    </section>
</body>
</html>
